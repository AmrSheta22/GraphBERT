model_name_or_path: allenai/longformer-base-4096
output_dir: outputs/longformer-gcn-wikitext103
seed: 1337

dataset:
  name: Salesforce/wikitext
  config_name: wikitext-103-raw-v1
  text_column: text
  validation_split_percentage: 5
  max_seq_length: 4096
  preprocessing_num_workers: 4
  line_by_line: false
  global_attention_on_cls: true

graph:
  num_replaced_layers: 2
  replacement_strategy: final  # final | intermediate | first | uniform | explicit
  layer_indices: []             # required when replacement_strategy is explicit
  renormalize_adjacency: true
  symmetric_normalization: false
  add_self_loops: true
  gcn_weight_init: identity     # identity | xavier
  gcn_bias: true
  gcn_activation: gelu          # none | gelu | relu | silu
  gcn_dropout: 0.1

training:
  do_train: true
  do_eval: true
  overwrite_output_dir: false
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_steps: 1000
  warmup_ratio: 0.06
  logging_steps: 25
  eval_steps: 100
  save_steps: 250
  save_strategy: steps
  save_only_model: false
  save_total_limit: 1
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 2
  report_to: tensorboard
  mlm_probability: 0.15
