model_name_or_path: allenai/longformer-base-4096
output_dir: outputs/longformer-appnp-wikitext103
seed: 1337

dataset:
  name: Salesforce/wikitext
  config_name: wikitext-103-raw-v1
  text_column: text
  validation_split_percentage: 5
  max_seq_length: 4096
  preprocessing_num_workers: 4
  line_by_line: false
  global_attention_on_cls: true

graph:
  num_replaced_layers: 2        # legacy name: number of layers receiving APPNP adapters
  replacement_strategy: final  # adapter placement: final | intermediate | first | uniform | explicit
  layer_indices: []             # required when replacement_strategy is explicit
  renormalize_adjacency: false
  symmetric_normalization: true
  add_self_loops: true
  appnp_steps: 8
  appnp_teleport_probability: 0.1
  appnp_weight_init: identity   # identity | xavier
  appnp_bias: true
  appnp_activation: gelu        # none | gelu | relu | silu
  appnp_dropout: 0.1
  appnp_initial_scale: 0.0      # exact baseline equivalence at initialization
  appnp_gate_type: scalar       # scalar | channel

training:
  do_train: true
  do_eval: true
  overwrite_output_dir: false
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_steps: 1000
  warmup_ratio: 0.06
  logging_steps: 25
  eval_steps: 100
  save_steps: 250
  save_strategy: steps
  save_only_model: false
  save_total_limit: 1
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 2
  report_to: tensorboard
  mlm_probability: 0.15
